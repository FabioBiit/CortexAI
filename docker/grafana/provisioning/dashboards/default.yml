# CortexAI — Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: 'CortexAI Dashboards'
    orgId: 1
    folder: 'CortexAI'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false