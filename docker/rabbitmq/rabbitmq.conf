# CortexAI — RabbitMQ Configuration
#
# NOTA: La topologia (exchange, code, binding) NON viene caricata da file.
# RabbitMQ 4.0 tratta load_definitions come stato completo desiderato,
# sovrascrivendo gli utenti creati da RABBITMQ_DEFAULT_USER/PASS.
# La topologia viene dichiarata dal codice applicativo al boot (Fase 2).
# Il file definitions.json resta nel repo come documentazione di riferimento.

# Listener
listeners.tcp.default = 5672

# Management plugin (UI web su porta 15672)
management.tcp.port = 15672

# Memory & Disk
vm_memory_high_watermark.relative = 0.6
disk_free_limit.absolute = 500MB

# Heartbeat (controlla connessioni consumatori)
heartbeat = 30

# Consumer timeout (disconnette consumatori non responsivi)
consumer_timeout = 1800000

# Prometheus metrics
prometheus.return_per_object_metrics = true
