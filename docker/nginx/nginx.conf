# ============================================================================
# Nginx Configuration — CortexAI Reverse Proxy
# ============================================================================
# Nginx è il punto d'ingresso UNICO per tutto il traffico esterno.
# Ogni richiesta passa da qui prima di raggiungere qualsiasi servizio.
# ============================================================================

# Worker processes: "auto" = uno per core CPU disponibile
# Ogni worker gestisce migliaia di connessioni concorrenti (event-driven)
worker_processes auto;

# Numero massimo di connessioni simultanee per worker
events {
    worker_connections 1024;
    # multi_accept on;   # Accetta più connessioni alla volta (utile sotto carico)
}

http {
    # --- MIME Types ---
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging ---
    # Formato log strutturato con informazioni utili per debug e monitoring
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time '
                    'rid=$request_id';
    # rt  = tempo totale della richiesta (Nginx → backend → risposta)
    # uct = tempo per connettersi al backend
    # urt = tempo di risposta del backend
    # rid = ID univoco per tracciare la richiesta attraverso i servizi

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # --- Performance ---
    sendfile on;                        # Trasferimento file efficiente (zero-copy)
    tcp_nopush on;                      # Ottimizza invio pacchetti TCP
    tcp_nodelay on;                     # Riduce latenza per small writes
    keepalive_timeout 65;               # Connessioni keep-alive (secondi)

    # --- Compressione ---
    # Comprimi le risposte per ridurre la banda (specialmente per JSON delle API)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;                  # 1-9, 6 è un buon bilanciamento
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 256;                # Non comprimere risposte < 256 bytes

    # --- Security ---
    # Nasconde la versione di Nginx nelle risposte (sicurezza by obscurity)
    server_tokens off;

    # Dimensione massima upload file (documenti da indicizzare)
    client_max_body_size 50M;           # Max 50MB per file

    # --- Rate Limiting ---
    # Definisce zone di rate limiting condivise tra tutti i worker.
    # $binary_remote_addr = IP del client (in formato binario, risparmia memoria)
    # zone=api:10m = 10MB di memoria condivisa (~160.000 IP tracciabili)
    # rate=30r/s = massimo 30 richieste al secondo per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=10r/s;

    # Risposta personalizzata quando il rate limit è superato
    limit_req_status 429;               # 429 Too Many Requests

    # --- Upstream Backends ---
    # Definisce i backend a cui Nginx instrada le richieste.
    # In futuro, puoi aggiungere più istanze per load balancing:
    #   upstream api_backend {
    #       server api-gateway-1:8000;
    #       server api-gateway-2:8000;
    #   }

    upstream api_backend {
        server api-gateway:8000;
        keepalive 32;                   # Connessioni persistenti al backend
    }

    # TODO FASE 5: Decommentare quando MCP server è implementato
    # upstream mcp_backend {
    #     server mcp-server:8001;
    #     keepalive 16;
    # }

    upstream grafana_backend {
        server grafana:3000;
    }

    upstream rabbitmq_backend {
        server rabbitmq:15672;
    }

    # ========================================================================
    # SERVER — HTTP (porta 80)
    # ========================================================================
    server {
        listen 80;
        server_name cortexai.local localhost;

        # --- Security Headers ---
        # Aggiunti a OGNI risposta, indipendentemente dal backend
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Request ID: generato da Nginx, propagato ai backend per tracing
        add_header X-Request-ID $request_id always;

        # --- Health Check ---
        # Usato da Docker healthcheck e load balancer esterni
        location /health {
            access_log off;             # Non loggare healthcheck (rumore)
            return 200 '{"status":"healthy","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # --- API Gateway ---
        # Tutte le richieste /api/* vanno al FastAPI Gateway
        location /api/ {
            # Rate limiting: 30 req/s con burst di 20 senza delay
            # burst=20: accetta fino a 20 richieste extra in coda
            # nodelay: le richieste in burst vengono processate subito (non ritardate)
            limit_req zone=api_limit burst=20 nodelay;

            # Proxy al backend FastAPI
            proxy_pass http://api_backend;

            # Headers propagati al backend (il backend li usa per logging e auth)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeout per operazioni lunghe (es. generazione LLM)
            proxy_connect_timeout 10s;   # Timeout connessione al backend
            proxy_read_timeout 120s;     # Timeout lettura risposta (LLM può essere lento)
            proxy_send_timeout 30s;      # Timeout invio richiesta al backend

            # Connessioni keep-alive al backend
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # --- MCP Server ---
        # Endpoint per agenti AI (rate limit più restrittivo)
        # TODO FASE 5: Decommentare quando MCP server è implementato
        # location /mcp/ {
        #     limit_req zone=mcp_limit burst=10 nodelay;
        #
        #     proxy_pass http://mcp_backend;
        #
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_set_header X-Request-ID $request_id;
        #
        #     # MCP può usare SSE (Server-Sent Events) per streaming
        #     proxy_buffering off;         # Disabilita buffering per SSE
        #     proxy_cache off;
        #     proxy_read_timeout 300s;     # Timeout più alto per sessioni lunghe
        # }

        # --- Grafana Dashboard ---
        location /grafana/ {
            # Nessun rate limiting: dashboard interno, accesso limitato
            proxy_pass http://grafana_backend/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket support (Grafana usa WS per live dashboards)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- RabbitMQ Management UI ---
        location /rabbitmq/ {
            # Solo per dev! In produzione, questo andrebbe protetto o rimosso
            proxy_pass http://rabbitmq_backend/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Catch-all: 404 ---
        location / {
            return 404 '{"error":"Not found","hint":"Try /api/docs for API documentation"}';
            add_header Content-Type application/json;
        }
    }

    # ========================================================================
    # SERVER — HTTPS (porta 443) — Opzionale per sviluppo locale
    # ========================================================================
    # Decommenta per abilitare HTTPS locale con certificato self-signed.
    # Genera il certificato con:
    #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #     -keyout docker/nginx/ssl/server.key \
    #     -out docker/nginx/ssl/server.crt \
    #     -subj "/CN=cortexai.local"
    #
    # server {
    #     listen 443 ssl;
    #     server_name cortexai.local localhost;
    #
    #     ssl_certificate /etc/nginx/ssl/server.crt;
    #     ssl_certificate_key /etc/nginx/ssl/server.key;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # ... stesse location di sopra ...
    # }
}